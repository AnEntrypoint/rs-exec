  <style>

    .hero h1 { font-size: 4rem; font-weight: 800; margin: 0 0 1rem; letter-spacing: -2px; background: linear-gradient(135deg, #f97583, #ffa657); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .badge-row { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; margin-bottom: 2rem; }

    .section { max-width: 1100px; margin: 0 auto; padding: 3rem 2rem; }

    .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }

    .card h3 { margin: 0 0 0.5rem; font-size: 1rem; color: var(--panel-text, #e6edf3); font-family: var(--ff-mono, ui-monospace, monospace); color: #ffa657; }

    .cmd-table th { text-align: left; padding: 0.6rem 1rem; border-bottom: 2px solid var(--panel-border, #30363d); color: var(--panel-muted, #8b949e); font-weight: 600; }
    .cmd-table td { padding: 0.5rem 1rem; border-bottom: 1px solid var(--panel-border, #21262d); vertical-align: top; }
    .cmd-table td:first-child { font-family: var(--ff-mono, ui-monospace, monospace); color: #ffa657; white-space: nowrap; }
    .code-block { background: var(--panel-bg-2, #161b22); border: 1px solid var(--panel-border, #30363d); border-radius: 12px; padding: 1.5rem; overflow-x: auto; }
    .code-block pre { margin: 0; font-family: var(--ff-mono, ui-monospace, monospace); font-size: 0.85rem; color: var(--panel-text, #e6edf3); line-height: 1.6; }

<body>
<div id="app"></div>
<script type="module">
import { h, applyDiff } from 'anentrypoint-design';

const FEATURES = [
  ['exec:nodejs',   'Run JavaScript via embedded Node runtime — auto-resolves require/import.'],
  ['exec:python',   'Python execution with venv reuse and stdlib access.'],
  ['exec:bash',     'POSIX shell on every platform — Windows uses bundled busybox sh.'],
  ['exec:typescript', 'Direct TS execution via tsx — zero-config types.'],
  ['exec:go',       'Compile-and-run Go snippets with module cache reuse.'],
  ['exec:rust',     'Cargo-script style Rust execution — single-file crates.'],
  ['exec:c / cpp',  'One-shot C/C++ via cc/c++ with auto-link of libm/pthread.'],
  ['exec:java',     'javac + java in a temp classpath — JDK on PATH required.'],
  ['Background tasks', 'Long-running tasks tracked by id; tail/kill/sleep on demand.'],
  ['Daemon runner',    'Persistent runner reuses interpreters — sub-100ms warm starts.'],
  ['kill-port',     'Cross-platform port reaper — find and SIGKILL whatever holds the socket.'],
  ['RPC client',    'JSON-RPC over stdio for embedding rs-exec into other tools.'],
];

const COMMANDS = [
  ['rs-exec exec --lang nodejs <code>', 'One-shot execute code in a chosen language.'],
  ['rs-exec bash <commands>',           'Run shell commands through the unified bash wrapper.'],
  ['rs-exec runner start',              'Start the persistent runner daemon.'],
  ['rs-exec runner status',             'Show runner port, PID, uptime.'],
  ['rs-exec runner stop',               'Graceful shutdown; kills tracked child tasks.'],
  ['rs-exec kill-port <port>',          'Free a TCP port across Windows/Linux/macOS.'],
  ['rs-exec session-cleanup',           'Reap orphaned background tasks for the current session.'],
];

function FeatureCard({ name, desc }) {
  return h('div', { class: 'card' },
    h('h3', {}, name),
    h('p', {}, desc),
  );
}

function CmdTable() {
  return h('table', { class: 'cmd-table' },
    h('thead', {}, h('tr', {}, h('th', {}, 'Command'), h('th', {}, 'Purpose'))),
    h('tbody', {}, ...COMMANDS.map(([c, d]) =>
      h('tr', {}, h('td', {}, c), h('td', { style: 'color:var(--panel-muted,#8b949e)' }, d))
    )),
  );
}

function CodeExample() {
  return h('div', { class: 'code-block' },
    h('pre', {},
      h('span', { class: 'cmt' }, '# install\n'),
      'cargo install --git https://github.com/AnEntrypoint/rs-exec\n\n',
      h('span', { class: 'cmt' }, '# one-shot exec\n'),
      'rs-exec exec --lang nodejs ', h('span', { class: 'str' }, '"console.log(2+2)"'), '\n\n',
      h('span', { class: 'cmt' }, '# warm runner for sub-100ms re-runs\n'),
      'rs-exec runner start\n',
      'rs-exec exec --lang python ', h('span', { class: 'str' }, '"import sys; print(sys.version)"'), '\n\n',
      h('span', { class: 'cmt' }, '# free a stuck port\n'),
      'rs-exec kill-port 5173\n',
    )
  );
}

function App() {
  return h('div', {},
    h('div', { class: 'hero' },
      h('h1', {}, 'rs-exec'),
      h('p', {}, 'Polyglot code-execution CLI and daemon. Run JavaScript, Python, Bash, TypeScript, Go, Rust, C/C++, and Java from one binary — with a warm runner that keeps interpreters alive between calls.'),
      h('div', { class: 'badge-row' },
        h('span', { class: 'badge' }, '9 languages'),
        h('span', { class: 'badge' }, 'Tokio · Axum'),
        h('span', { class: 'badge' }, 'Windows · Linux · macOS'),
        h('span', { class: 'badge' }, 'MIT · Rust 2021'),
      ),
      h('div', { style: 'display:flex;gap:1rem;justify-content:center;flex-wrap:wrap' },
        h('a', { href: 'https://github.com/AnEntrypoint/rs-exec', class: 'btn btn-primary btn-sm', style: 'text-decoration:none' }, 'GitHub'),
        h('a', { href: 'https://github.com/AnEntrypoint/rs-exec/releases', class: 'btn btn-ghost btn-sm', style: 'text-decoration:none' }, 'Releases'),
      ),
    ),
    h('div', { class: 'section' },
      h('h2', {}, 'Features'),
      h('div', { class: 'grid-cards' },
        ...FEATURES.map(([name, desc]) => FeatureCard({ name, desc }))
      ),
    ),
    h('div', { class: 'section' },
      h('h2', {}, 'Commands'),
      CmdTable(),
    ),
    h('div', { class: 'section' },
      h('h2', {}, 'Quick start'),
      CodeExample(),
    ),
    h('footer', {},
      'Styled with ',
      h('a', { href: 'https://github.com/AnEntrypoint/247420' }, 'anentrypoint-design'),
      ' · ',
      h('a', { href: 'https://github.com/AnEntrypoint/rs-exec' }, 'Source on GitHub'),
    ),
  );
}

applyDiff(document.getElementById('app'), [App()]);
</script>
